id: default-policy
name: Default Company Policy
rules:
  - id: production-change
    name: Production Change Gate
    conditions:
      - "environment == prod"
    requires:
      - approval_from: operator
      - review_passed: true
    denies:
      - direct_secret_dump
    priority: 100

  - id: destructive-ops
    name: Destructive Operations Gate
    conditions:
      - "action contains delete"
      - "action contains force-push"
      - "action contains rm -rf"
    requires:
      - approval_from: operator
    denies: []
    priority: 90

  - id: external-access
    name: External Access Gate
    conditions:
      - "action contains external_api"
      - "action contains browser_submit"
    requires:
      - review_passed: true
    denies: []
    priority: 80

approvalGates:
  - deploy-production
  - secret-access
  - destructive-operations

version: "1.0.0"
