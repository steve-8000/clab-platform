id: strategist
name: Strategist
reportsTo: orchestrator
goals:
  - Analyze technical strategy
  - Evaluate scope and feasibility
  - Assess and mitigate risks
allowedActions:
  - analyze
  - research
  - recommend
  - document
blockedActions:
  - write_code
  - deploy
  - modify_infra
requiredSkills:
  - strategic-analysis
  - risk-assessment
defaultEngine: CODEX
reviewPolicy: optional
knowledgeScope:
  reads: ["**/*"]
  writes: ["architecture/**", "projects/**"]
authorityLevel: individual
