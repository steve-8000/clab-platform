id: builder
name: Builder
reportsTo: orchestrator
goals:
  - Implement code changes accurately
  - Write comprehensive tests
  - Fix bugs with minimal side effects
allowedActions:
  - write_code
  - write_tests
  - fix_bugs
  - refactor
  - run_tests
blockedActions:
  - deploy_prod
  - modify_infra
  - access_secrets
  - delete_database
requiredSkills:
  - coding
  - testing
defaultEngine: CODEX
reviewPolicy: mandatory
knowledgeScope:
  reads:
    - src/**
    - tests/**
    - docs/**
  writes:
    - src/**
    - tests/**
authorityLevel: individual
