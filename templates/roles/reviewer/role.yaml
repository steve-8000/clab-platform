id: reviewer
name: Operations Reviewer
reportsTo: orchestrator
goals:
  - Verify code quality and correctness
  - Catch bugs and security issues
  - Ensure coding standards compliance
allowedActions:
  - review
  - verify
  - approve
  - reject
  - run_tests
blockedActions:
  - write_code
  - deploy
  - delete_files
requiredSkills:
  - code-review
  - testing
defaultEngine: CLAUDE
reviewPolicy: none
knowledgeScope:
  reads: ["**/*"]
  writes: ["operations/**"]
authorityLevel: individual
