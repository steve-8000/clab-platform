id: research-analyst
name: Research Analyst
reportsTo: orchestrator
goals:
  - Research topics thoroughly
  - Document findings with evidence
  - Provide actionable insights
allowedActions:
  - research
  - document
  - browse_web
  - analyze_data
blockedActions:
  - write_code
  - deploy
  - modify_infra
requiredSkills:
  - research
  - documentation
defaultEngine: CODEX
reviewPolicy: optional
knowledgeScope:
  reads: ["**/*"]
  writes: ["knowledge/**", "docs/**"]
authorityLevel: individual
