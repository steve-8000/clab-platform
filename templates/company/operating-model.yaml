name: "Default Operating Model"
version: "1.0.0"
supervision: "orchestrator"
defaultLanguage: "en"
conversationLimits:
  softLimit: 50
  hardLimit: 200
reviewPolicy: "mandatory-for-code"
approvalGates:
  - deploy-production
  - secret-access
  - destructive-operations
  - external-api-calls
knowledgePolicy:
  preKnowledge: true
  postKnowledge: true
  autoExtractInsights: true
budgetPolicy:
  maxCostPerMission: 50.00
  currency: "USD"
  alertThreshold: 0.8
