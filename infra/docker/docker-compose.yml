# ============================================================================
# docker-compose.yml — Full clab-platform development stack
# Usage:  docker compose up -d
# ============================================================================

x-common-env: &common-env
  NODE_ENV: development
  DATABASE_URL: postgres://clab:clab_secret@postgres:5432/clab
  NATS_URL: nats://nats:4222
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  OTEL_SERVICE_NAME: "${SERVICE_NAME:-clab}"
  LOG_LEVEL: debug

services:
  # ==========================================================================
  # Infrastructure
  # ==========================================================================

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clab
      POSTGRES_PASSWORD: clab_secret
      POSTGRES_DB: clab
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clab"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ../otel/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP
      - "8888:8888"   # Prometheus metrics
      - "8889:8889"   # Prometheus exporter
    depends_on:
      nats:
        condition: service_healthy

  # ==========================================================================
  # Application services
  # ==========================================================================

  api-gateway:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: api-gateway
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: api-gateway
      PORT: "4000"
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  mission-service:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: mission-service
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: mission-service
      PORT: "4001"
      MAX_CONCURRENT_MISSIONS: "10"
      MAX_CONCURRENT_TASKS_PER_MISSION: "5"
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  runtime-manager:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: runtime-manager
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: runtime-manager
      PORT: "4002"
      TMUX_SOCKET_PATH: /tmp/cmux
    ports:
      - "4002:4002"
    volumes:
      - /tmp/cmux:/tmp/cmux
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-codex:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: worker-codex
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: worker-codex
      PORT: "4010"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      WORKER_CONCURRENCY: "3"
    ports:
      - "4010:4010"
    depends_on:
      nats:
        condition: service_healthy
      mission-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4010/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-claude:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: worker-claude
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: worker-claude
      PORT: "4011"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      WORKER_CONCURRENCY: "3"
    ports:
      - "4011:4011"
    depends_on:
      nats:
        condition: service_healthy
      mission-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4011/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  browser-service:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: browser-service
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: browser-service
      PORT: "4012"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    ports:
      - "4012:4012"
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4012/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  review-service:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.service
      args:
        SERVICE_NAME: review-service
    restart: unless-stopped
    environment:
      <<: *common-env
      SERVICE_NAME: review-service
      PORT: "4013"
    ports:
      - "4013:4013"
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4013/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Dashboard
  # ==========================================================================

  dashboard:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: ws://localhost:4000/ws
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Observability
  # ==========================================================================

  grafana:
    image: grafana/grafana-oss:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      - otel-collector

volumes:
  pg_data:
    driver: local
  grafana_data:
    driver: local
