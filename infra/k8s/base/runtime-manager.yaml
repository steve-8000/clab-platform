---
apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-manager-config
  namespace: clab
data:
  PORT: "4002"
  NATS_URL: "nats://nats:4222"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "runtime-manager"
  TMUX_SOCKET_PATH: "/tmp/cmux"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-manager
  namespace: clab
  labels:
    app.kubernetes.io/name: runtime-manager
    app.kubernetes.io/component: runtime
    app.kubernetes.io/part-of: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: runtime-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runtime-manager
        app.kubernetes.io/component: runtime
    spec:
      containers:
        - name: runtime-manager
          image: clab/runtime-manager:latest
          ports:
            - containerPort: 4002
              name: http
          envFrom:
            - configMapRef:
                name: runtime-manager-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: runtime-manager
  namespace: clab
  labels:
    app.kubernetes.io/name: runtime-manager
    app.kubernetes.io/component: runtime
    app.kubernetes.io/part-of: clab-platform
spec:
  type: ClusterIP
  ports:
    - port: 4002
      targetPort: 4002
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: runtime-manager
