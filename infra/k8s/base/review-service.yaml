---
apiVersion: v1
kind: ConfigMap
metadata:
  name: review-service-config
  namespace: clab
data:
  PORT: "4013"
  NATS_URL: "nats://nats:4222"
  DATABASE_URL: "postgres://clab:changeme@postgres:5432/clab"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "review-service"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: review-service
  namespace: clab
  labels:
    app.kubernetes.io/name: review-service
    app.kubernetes.io/component: review
    app.kubernetes.io/part-of: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: review-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: review-service
        app.kubernetes.io/component: review
    spec:
      containers:
        - name: review-service
          image: clab/review-service:latest
          ports:
            - containerPort: 4013
              name: http
          envFrom:
            - configMapRef:
                name: review-service-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: review-service
  namespace: clab
  labels:
    app.kubernetes.io/name: review-service
    app.kubernetes.io/component: review
    app.kubernetes.io/part-of: clab-platform
spec:
  type: ClusterIP
  ports:
    - port: 4013
      targetPort: 4013
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: review-service
