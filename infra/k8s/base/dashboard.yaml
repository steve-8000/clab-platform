---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: clab
data:
  NEXT_PUBLIC_API_URL: "https://api.clab.dev"
  NEXT_PUBLIC_WS_URL: "wss://api.clab.dev/ws"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: clab
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: clab-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dashboard
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: dashboard
          image: clab/dashboard:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: dashboard-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: clab
  labels:
    app.kubernetes.io/name: dashboard
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: clab-platform
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: dashboard

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard
  namespace: clab
  labels:
    app.kubernetes.io/name: dashboard
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dashboard.clab.dev
      secretName: dashboard-tls
  rules:
    - host: dashboard.clab.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000
