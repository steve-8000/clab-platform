---
# ==========================================================================
# Worker: Codex
# ==========================================================================
apiVersion: v1
kind: Secret
metadata:
  name: worker-codex-secrets
  namespace: clab
type: Opaque
stringData:
  OPENAI_API_KEY: changeme-in-overlay

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-codex-config
  namespace: clab
data:
  PORT: "4010"
  NATS_URL: "nats://nats:4222"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "worker-codex"
  WORKER_CONCURRENCY: "3"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-codex
  namespace: clab
  labels:
    app.kubernetes.io/name: worker-codex
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker-codex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker-codex
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker-codex
          image: clab/worker-codex:latest
          ports:
            - containerPort: 4010
              name: http
          envFrom:
            - configMapRef:
                name: worker-codex-config
            - secretRef:
                name: worker-codex-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: worker-codex
  namespace: clab
  labels:
    app.kubernetes.io/name: worker-codex
spec:
  type: ClusterIP
  ports:
    - port: 4010
      targetPort: 4010
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: worker-codex

