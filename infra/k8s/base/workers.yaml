---
# ==========================================================================
# Worker: Browser
# ==========================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: browser-service-config
  namespace: clab
data:
  PORT: "4012"
  NATS_URL: "nats://nats:4222"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "browser-service"
  PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browser-service
  namespace: clab
  labels:
    app.kubernetes.io/name: browser-service
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: browser-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browser-service
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: browser-service
          image: clab/browser-service:latest
          ports:
            - containerPort: 4012
              name: http
          envFrom:
            - configMapRef:
                name: browser-service-config
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: browser-service
  namespace: clab
  labels:
    app.kubernetes.io/name: browser-service
spec:
  type: ClusterIP
  ports:
    - port: 4012
      targetPort: 4012
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: browser-service
