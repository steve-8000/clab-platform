---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mission-service-config
  namespace: clab
data:
  PORT: "4001"
  NATS_URL: "nats://nats:4222"
  DATABASE_URL: "postgres://clab:changeme@postgres:5432/clab"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "mission-service"
  MAX_CONCURRENT_MISSIONS: "10"
  MAX_CONCURRENT_TASKS_PER_MISSION: "5"
  LOG_LEVEL: "info"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-service
  namespace: clab
  labels:
    app.kubernetes.io/name: mission-service
    app.kubernetes.io/component: mission-service
    app.kubernetes.io/part-of: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mission-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mission-service
        app.kubernetes.io/component: mission-service
    spec:
      containers:
        - name: mission-service
          image: clab/mission-service:latest
          ports:
            - containerPort: 4001
              name: http
          envFrom:
            - configMapRef:
                name: mission-service-config
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: mission-service
  namespace: clab
  labels:
    app.kubernetes.io/name: mission-service
    app.kubernetes.io/component: mission-service
    app.kubernetes.io/part-of: clab-platform
spec:
  type: ClusterIP
  ports:
    - port: 4001
      targetPort: 4001
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: mission-service
