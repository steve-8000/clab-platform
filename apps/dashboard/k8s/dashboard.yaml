apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
  namespace: clab-platform
data:
  CONTROL_PLANE_URL: "http://control-plane.clab.svc.cluster.local:8000"
  KNOWLEDGE_URL: "http://knowledge-service.clab.svc.cluster.local:4007"
  NODE_ENV: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: clab/dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: dashboard-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: clab-platform
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
