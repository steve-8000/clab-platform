---
apiVersion: v1
kind: ConfigMap
metadata:
  name: knowledge-service-config
  namespace: clab
  labels:
    app.kubernetes.io/name: knowledge-service
    app.kubernetes.io/component: knowledge
    app.kubernetes.io/part-of: clab-platform
data:
  PORT: "4007"
  STORE_DIR: "/data/knowledge"
  LOG_LEVEL: "info"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
  OTEL_SERVICE_NAME: "knowledge-service"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knowledge-data
  namespace: clab
  labels:
    app.kubernetes.io/name: knowledge-service
    app.kubernetes.io/component: knowledge
    app.kubernetes.io/part-of: clab-platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-service
  namespace: clab
  labels:
    app.kubernetes.io/name: knowledge-service
    app.kubernetes.io/component: knowledge
    app.kubernetes.io/part-of: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knowledge-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knowledge-service
        app.kubernetes.io/component: knowledge
        app.kubernetes.io/part-of: clab-platform
    spec:
      containers:
        - name: knowledge-service
          image: clab/knowledge-service:latest
          ports:
            - containerPort: 4007
              protocol: TCP
          envFrom:
            - configMapRef:
                name: knowledge-service-config
          volumeMounts:
            - name: knowledge-data
              mountPath: /data/knowledge
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 4007
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 4007
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: knowledge-data
          persistentVolumeClaim:
            claimName: knowledge-data
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-service
  namespace: clab
  labels:
    app.kubernetes.io/name: knowledge-service
    app.kubernetes.io/component: knowledge
    app.kubernetes.io/part-of: clab-platform
spec:
  type: ClusterIP
  ports:
    - port: 4007
      targetPort: 4007
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: knowledge-service
