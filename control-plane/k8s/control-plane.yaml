---
apiVersion: v1
kind: ConfigMap
metadata:
  name: control-plane-config
  namespace: clab
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: clab-platform
data:
  PORT: "8000"
  LOG_LEVEL: "info"
  OTEL_SERVICE_NAME: "control-plane"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: clab
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: clab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/part-of: clab-platform
    spec:
      containers:
        - name: control-plane
          image: clab/control-plane:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: control-plane-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: clab
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: clab-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: control-plane
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: control-plane
  namespace: clab
  labels:
    app.kubernetes.io/name: control-plane
    app.kubernetes.io/part-of: clab-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "Upgrade"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  tls:
    - hosts:
        - control.clab.dev
      secretName: control-clab-dev-tls
  rules:
    - host: control.clab.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: control-plane
                port:
                  number: 8000
